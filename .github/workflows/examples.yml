name: Examples

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  contents: read

jobs:
  examples:
    name: Type-check and run examples
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'test-examples'
    runs-on: ubuntu-latest
    environment: examples
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Type-check examples
        run: npm run typecheck:examples

      - name: Secret fingerprint (temporary diagnostic)
        run: |
          printf 'len=%s\n' "${#OPENAI_API_KEY}"
          printf 'sha16=%s\n' "$(printf '%s' "$OPENAI_API_KEY" | sha256sum | cut -c1-16)"
          printf 'startsSk=%s\n' "$(case "$OPENAI_API_KEY" in sk-*) echo yes;; *) echo no;; esac)"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run examples
        run: npm run test:examples
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
